<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>パン屋さんのレジ PWA - 個数計算版</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        font-family: sans-serif;
        background-color: #fdf5e6;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      h1 {
        margin: 5px 0;
        text-align: center;
        color: #5d4037;
        font-size: 20px;
      }
      .container {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 10px;
        gap: 15px;
      }

      /* 左側：商品ボタンエリア */
      .menu-wrapper {
        flex: 1;
        min-width: 320px;
        display: flex;
        flex-direction: column;
      }
      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
        flex: 1;
        overflow-y: auto;
        padding-right: 5px;
      }
      .item-btn {
        background-color: #fff3e0;
        border: 2px solid #deb887;
        height: 85px;
        color: #5d4037;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        border-radius: 10px;
      }
      .item-btn:active {
        background-color: #deb887;
        transform: scale(0.95);
      }

      /* 個数選択パネル */
      .qty-panel {
        background: #efebe9;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .qty-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
      }
      .qty-btn {
        height: 40px;
        border: 1px solid #8d6e63;
        background: white;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
      }
      .qty-btn.active {
        background: #8d6e63;
        color: white;
      }

      /* 左下：操作パネル */
      .control-panel {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .main-controls {
        display: flex;
        gap: 10px;
      }
      .undo-btn {
        background-color: #f0ad4e;
        color: white;
        flex: 1;
        height: 55px;
        border: none;
        font-size: 18px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .clear-btn {
        background-color: #d9534f;
        color: white;
        flex: 1;
        height: 55px;
        border: none;
        font-size: 18px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .report-btn {
        background-color: #5bc0de;
        color: white;
        height: 40px;
        border: none;
        font-size: 15px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }

      /* 右側：会計エリア */
      .receipt-container {
        flex: 2;
        display: flex;
        background: white;
        border: 2px solid #333;
        box-shadow: 5px 5px 0px #ccc;
        padding: 15px;
        gap: 20px;
      }
      .receipt-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 2px solid #eee;
        padding-right: 15px;
        min-width: 200px;
      }
      #item-list {
        flex: 1;
        overflow-y: auto;
        text-align: left;
        font-size: 16px;
      }
      .total-area {
        font-size: 32px;
        font-weight: bold;
        margin-top: 5px;
        text-align: right;
        color: #d32f2f;
        border-top: 3px solid #333;
        padding-top: 5px;
      }

      .receipt-right {
        width: 320px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }
      .tenkey-container {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ddd;
      }
      .tenkey-display {
        background: white;
        border: 2px solid #999;
        font-size: 32px;
        padding: 5px 15px;
        text-align: right;
        margin-bottom: 12px;
        height: 45px;
        line-height: 45px;
        font-family: monospace;
        font-weight: bold;
      }
      .tenkey-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .tenkey-btn {
        height: 60px;
        font-size: 24px;
        background: white;
        border: 1px solid #bbb;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 3px 0 #ccc;
      }
      .tenkey-btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }
      .tenkey-clear {
        background: #cfd8dc;
      }

      .change-display {
        font-size: 30px;
        color: #1976d2;
        font-weight: bold;
        text-align: right;
        margin-top: 15px;
        border-top: 2px dashed #ccc;
        padding-top: 10px;
      }

      #report-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 3px solid #333;
        padding: 20px;
        z-index: 100;
        width: 90%;
        max-width: 500px;
        border-radius: 15px;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 99;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: right;
      }
      .csv-btn {
        background-color: #2e7d32;
        color: white;
        margin-top: 15px;
        width: 100%;
        height: 50px;
        border: none;
        font-size: 18px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>🥖 パン屋さんレジ PWA 🥐</h1>

    <div class="container">
      <div class="menu-wrapper">
        <div class="qty-panel">
          <div
            style="
              font-size: 13px;
              font-weight: bold;
              color: #5d4037;
              margin-bottom: 5px;
            "
          >
            個数を選択してからパンを押す：
          </div>
          <div class="qty-grid">
            <button id="qty1" class="qty-btn active" onclick="setQty(1)">
              ×1
            </button>
            <button id="qty2" class="qty-btn" onclick="setQty(2)">×2</button>
            <button id="qty3" class="qty-btn" onclick="setQty(3)">×3</button>
            <button id="qty4" class="qty-btn" onclick="setQty(4)">×4</button>
            <button id="qty5" class="qty-btn" onclick="setQty(5)">×5</button>
            <button id="qty6" class="qty-btn" onclick="setQty(6)">×6</button>
            <button id="qty7" class="qty-btn" onclick="setQty(7)">×7</button>
            <button id="qty8" class="qty-btn" onclick="setQty(8)">×8</button>
            <button id="qty9" class="qty-btn" onclick="setQty(9)">×9</button>
            <button id="qty10" class="qty-btn" onclick="setQty(10)">×10</button>
          </div>
        </div>

        <div class="menu" id="button-container"></div>

        <div class="control-panel">
          <div class="main-controls">
            <button class="undo-btn" onclick="undoItem()">一つ戻る</button>
            <button class="clear-btn" onclick="resetCalc()">会計終了</button>
          </div>
          <button class="report-btn" onclick="showReport()">
            📈 本日の売上を確認
          </button>
        </div>
      </div>

      <div class="receipt-container">
        <div class="receipt-left">
          <h3 style="margin: 0 0 10px 0; font-size: 18px">注文内容</h3>
          <div id="item-list"></div>
          <div class="total-area">合計: <span id="total-price">0</span>円</div>
        </div>

        <div class="receipt-right">
          <div class="tenkey-container">
            <div
              style="
                font-size: 14px;
                color: #666;
                font-weight: bold;
                margin-bottom: 5px;
              "
            >
              お預かり金額
            </div>
            <div id="cash-display" class="tenkey-display">0</div>
            <div class="tenkey-grid">
              <button class="tenkey-btn" onclick="pressKey('7')">7</button>
              <button class="tenkey-btn" onclick="pressKey('8')">8</button>
              <button class="tenkey-btn" onclick="pressKey('9')">9</button>
              <button class="tenkey-btn" onclick="pressKey('4')">4</button>
              <button class="tenkey-btn" onclick="pressKey('5')">5</button>
              <button class="tenkey-btn" onclick="pressKey('6')">6</button>
              <button class="tenkey-btn" onclick="pressKey('1')">1</button>
              <button class="tenkey-btn" onclick="pressKey('2')">2</button>
              <button class="tenkey-btn" onclick="pressKey('3')">3</button>
              <button class="tenkey-btn" onclick="pressKey('0')">0</button>
              <button class="tenkey-btn" onclick="pressKey('00')">00</button>
              <button class="tenkey-btn tenkey-clear" onclick="pressKey('C')">
                C
              </button>
            </div>
          </div>
          <div id="change-area" class="change-display">
            お釣り: <span id="change">0</span>円
          </div>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeReport()"></div>
    <div id="report-modal">
      <h2 style="text-align: center">📊 本日の売上集計</h2>
      <table id="report-table">
        <thead>
          <tr>
            <th>商品名</th>
            <th>個数</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
      <h3
        id="report-total"
        style="text-align: right; color: #d32f2f; margin-top: 15px"
      ></h3>
      <button class="csv-btn" onclick="downloadCSV()">CSVで保存する</button>
      <button
        onclick="closeReport()"
        style="
          width: 100%;
          margin-top: 10px;
          height: 45px;
          border: 1px solid #ccc;
          background: white;
          border-radius: 10px;
        "
      >
        閉じる
      </button>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }

      const products = [
        { name: "全粒粉", price: 1400 },
        { name: "全粒粉 1/2", price: 700 },
        { name: "自家製酵母", price: 1200 },
        { name: "自家製酵母 1/2", price: 600 },
        { name: "長いパン", price: 350 },
        { name: "山食", price: 600 },
        { name: "クロワッサン", price: 280 },
        { name: "スコーン", price: 250 },
      ];

      let total = 0;
      let cashInput = "0";
      let history = [];
      let dailySales = {};
      let currentQty = 1; // ★ 現在選択されている個数

      products.forEach((p) => (dailySales[p.name] = { count: 0, total: 0 }));

      const container = document.getElementById("button-container");
      products.forEach((p) => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        btn.innerHTML = `${p.name}<br>${p.price.toLocaleString()}円`;
        btn.onclick = () => addItem(p.name, p.price);
        container.appendChild(btn);
      });

      // ★ 個数をセットする関数
      function setQty(num) {
        currentQty = num;
        // ボタンの見た目（色）を変える
        for (let i = 1; i <= 10; i++) {
          document.getElementById("qty" + i).classList.remove("active");
        }
        document.getElementById("qty" + num).classList.add("active");
      }

      function addItem(name, price) {
        const subtotal = price * currentQty;
        total += subtotal;

        // 履歴には「個数」も保存（1つ戻る時に必要）
        history.push({ name: name, price: price, qty: currentQty });

        // 売上集計に加算
        dailySales[name].count += currentQty;
        dailySales[name].total += subtotal;

        const list = document.getElementById("item-list");
        const itemElement = document.createElement("div");
        itemElement.style.borderBottom = "1px dashed #ddd";
        itemElement.style.padding = "5px 0";
        itemElement.style.display = "flex";
        itemElement.style.justifyContent = "space-between";

        // 複数個の場合は「×10」のように表示
        const qtyText =
          currentQty > 1
            ? ` <span style="color:red; font-weight:bold;">×${currentQty}</span>`
            : "";
        itemElement.innerHTML = `<span>・${name}${qtyText}</span><span>${subtotal.toLocaleString()}円</span>`;

        list.appendChild(itemElement);
        list.scrollTop = list.scrollHeight;

        updateDisplay();
        setQty(1); // ★ パンを押した後は個数を1に戻す
      }

      function undoItem() {
        if (history.length > 0) {
          const lastItem = history.pop();
          total -= lastItem.price * lastItem.qty;
          dailySales[lastItem.name].count -= lastItem.qty;
          dailySales[lastItem.name].total -= lastItem.price * lastItem.qty;
          document
            .getElementById("item-list")
            .removeChild(document.getElementById("item-list").lastChild);
          updateDisplay();
        }
      }

      function pressKey(key) {
        if (key === "C") {
          cashInput = "0";
        } else if (key === "00") {
          if (cashInput !== "0") cashInput += "00";
        } else {
          if (cashInput === "0") {
            cashInput = key;
          } else {
            cashInput += key;
          }
        }
        if (cashInput.length > 10) cashInput = cashInput.slice(0, 10);
        updateDisplay();
      }

      function updateDisplay() {
        document.getElementById("total-price").innerText =
          total.toLocaleString();
        document.getElementById("cash-display").innerText =
          parseInt(cashInput).toLocaleString();
        const change = parseInt(cashInput) - total;
        document.getElementById("change").innerText =
          change >= 0 && total > 0 ? change.toLocaleString() : 0;
      }

      function resetCalc() {
        if (confirm("会計をクリアしますか？")) {
          total = 0;
          cashInput = "0";
          history = [];
          document.getElementById("item-list").innerHTML = "";
          setQty(1);
          updateDisplay();
        }
      }

      function showReport() {
        const body = document.getElementById("report-body");
        body.innerHTML = "";
        let grandTotal = 0;
        for (const name in dailySales) {
          body.innerHTML += `<tr><td style="text-align:left;">${name}</td><td>${dailySales[name].count}</td><td>${dailySales[name].total.toLocaleString()}円</td></tr>`;
          grandTotal += dailySales[name].total;
        }
        document.getElementById("report-total").innerText =
          `総合計: ${grandTotal.toLocaleString()}円`;
        document.getElementById("modal-overlay").style.display = "block";
        document.getElementById("report-modal").style.display = "block";
      }

      function downloadCSV() {
        let csvContent = "\ufeff商品名,個数,売上金額\n";
        let grandTotal = 0;
        for (const name in dailySales) {
          csvContent += `${name},${dailySales[name].count},${dailySales[name].total}\n`;
          grandTotal += dailySales[name].total;
        }
        csvContent += `合計,,${grandTotal}\n`;
        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `sales_${new Date().toLocaleDateString().replace(/\//g, "")}.csv`;
        link.click();
      }

      function closeReport() {
        document.getElementById("modal-overlay").style.display = "none";
        document.getElementById("report-modal").style.display = "none";
      }
    </script>
  </body>
</html>

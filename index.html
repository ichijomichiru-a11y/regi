<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>パン屋さんのレジ PWA</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <style>
      /* スタイルは前回のものをそのまま使用 */
      body {
        font-family: sans-serif;
        background-color: #fdf5e6;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      h1 {
        margin: 10px 0;
        text-align: center;
      }
      .container {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 10px;
        gap: 20px;
      }
      .menu-wrapper {
        flex: 1;
        max-width: 600px;
        display: flex;
        flex-direction: column;
      }
      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
      }
      button {
        padding: 15px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-weight: bold;
      }
      .item-btn {
        background-color: #ffebcd;
        height: 80px;
      }
      .item-btn:active {
        background-color: #deb887;
      }
      .control-panel {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .undo-btn {
        background-color: #f0ad4e;
        color: white;
        flex: 1;
      }
      .report-btn {
        background-color: #5bc0de;
        color: white;
        flex: 1;
      }
      .clear-btn {
        background-color: #d9534f;
        color: white;
        flex: 1;
      }
      .receipt-container {
        width: 320px;
        display: flex;
        flex-direction: column;
        background: white;
        border: 2px solid #333;
        box-shadow: 5px 5px 0px #ccc;
        padding: 15px;
      }
      #item-list {
        flex: 1;
        overflow-y: auto;
        text-align: left;
      }
      .total-area {
        font-size: 24px;
        font-weight: bold;
        margin-top: 10px;
        border-top: 2px solid #333;
        padding-top: 10px;
      }
      #report-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 3px solid #333;
        padding: 20px;
        z-index: 100;
        width: 90%;
        max-width: 450px;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 99;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: right;
      }
      .csv-btn {
        background-color: #28a745;
        color: white;
        margin-top: 15px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>🥖 パン屋さんレジアプリ 🥐</h1>

    <div class="container">
      <div class="menu-wrapper">
        <div class="menu" id="button-container"></div>
        <div class="control-panel">
          <button class="undo-btn" onclick="undoItem()">1つ戻す</button>
          <button class="report-btn" onclick="showReport()">売上集計</button>
          <button class="clear-btn" onclick="resetCalc()">会計終了/次へ</button>
        </div>
      </div>

      <div class="receipt-container">
        <h3>注文内容</h3>
        <div id="item-list"></div>
        <div class="total-area">合計: <span id="total-price">0</span>円</div>
        <div style="margin-top: 15px">
          お預かり:
          <input
            type="number"
            id="cash"
            oninput="calcChange()"
            placeholder="0"
          />円
          <div style="font-size: 20px; color: blue; margin-top: 10px">
            お釣り: <span id="change">0</span>円
          </div>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeReport()"></div>
    <div id="report-modal">
      <h2>📊 本日の売上集計</h2>
      <table id="report-table">
        <thead>
          <tr>
            <th>商品名</th>
            <th>個数</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
      <h3 id="report-total" style="text-align: right"></h3>
      <button class="csv-btn" onclick="downloadCSV()">CSV保存</button>
      <button onclick="closeReport()" style="width: 100%; margin-top: 10px">
        閉じる
      </button>
    </div>

    <script>
      // --- オフライン対応用の命令 (Service Workerの登録) ---
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").then(() => {
          console.log("オフライン対応完了！");
        });
      }

      // --- 以下、レジのロジック (前回と同じ) ---
      const products = [
        { name: "あんパン", price: 150 },
        { name: "食パン", price: 300 },
        { name: "クロワッサン", price: 200 },
        { name: "メロンパン", price: 180 },
        { name: "カレーパン", price: 220 },
        { name: "サンドイッチ", price: 450 },
      ];

      let total = 0;
      let history = [];
      let dailySales = {};
      products.forEach((p) => (dailySales[p.name] = { count: 0, total: 0 }));

      const container = document.getElementById("button-container");
      products.forEach((p) => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        btn.innerHTML = `${p.name}<br>${p.price}円`;
        btn.onclick = () => addItem(p.name, p.price);
        container.appendChild(btn);
      });

      function addItem(name, price) {
        total += price;
        history.push({ name: name, price: price });
        dailySales[name].count++;
        dailySales[name].total += price;
        updateDisplay();
        const list = document.getElementById("item-list");
        const itemElement = document.createElement("div");
        itemElement.innerText = `・${name} (${price}円)`;
        list.appendChild(itemElement);
        list.scrollTop = list.scrollHeight;
        calcChange();
      }

      function undoItem() {
        if (history.length > 0) {
          const lastItem = history.pop();
          total -= lastItem.price;
          dailySales[lastItem.name].count--;
          dailySales[lastItem.name].total -= lastItem.price;
          updateDisplay();
          document
            .getElementById("item-list")
            .removeChild(document.getElementById("item-list").lastChild);
          calcChange();
        }
      }

      function showReport() {
        const body = document.getElementById("report-body");
        body.innerHTML = "";
        let grandTotal = 0;
        for (const name in dailySales) {
          body.innerHTML += `<tr><td>${name}</td><td>${dailySales[name].count}</td><td>${dailySales[name].total}円</td></tr>`;
          grandTotal += dailySales[name].total;
        }
        document.getElementById("report-total").innerText =
          `総合計: ${grandTotal}円`;
        document.getElementById("modal-overlay").style.display = "block";
        document.getElementById("report-modal").style.display = "block";
      }

      function downloadCSV() {
        let csvContent = "\ufeff商品名,個数,売上金額\n";
        let grandTotal = 0;
        for (const name in dailySales) {
          csvContent += `${name},${dailySales[name].count},${dailySales[name].total}\n`;
          grandTotal += dailySales[name].total;
        }
        csvContent += `合計,,${grandTotal}\n`;
        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `sales.csv`);
        link.click();
      }

      function closeReport() {
        document.getElementById("modal-overlay").style.display = "none";
        document.getElementById("report-modal").style.display = "none";
      }

      function updateDisplay() {
        document.getElementById("total-price").innerText = total;
      }

      function calcChange() {
        const cash = document.getElementById("cash").value;
        document.getElementById("change").innerText =
          cash >= total && total > 0 ? cash - total : 0;
      }

      function resetCalc() {
        if (confirm("会計をクリアしますか？")) {
          total = 0;
          history = [];
          updateDisplay();
          document.getElementById("item-list").innerHTML = "";
          document.getElementById("cash").value = "";
          document.getElementById("change").innerText = 0;
        }
      }
    </script>
  </body>
</html>
